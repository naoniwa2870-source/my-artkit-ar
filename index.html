<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Artkit AR Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

    <!-- ① URLパラメータを最初に取得（A-Frame より前に確定） -->
    <script>
        (function () {
            var raw = new URLSearchParams(window.location.search).get('id') || '';
            window.__orderId = raw.replace(/[^a-zA-Z0-9_-]/g, '');
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed; background: #000;
        }
        a-scene { width: 100vw; height: 100vh; }

        /* ===== ローディング画面 ===== */
        #loader {
            height: 100%; width: 100%; position: fixed; top: 0; left: 0;
            background:
                radial-gradient(ellipse at 50% 42%, rgba(212,175,55,.08) 0%, transparent 58%),
                radial-gradient(ellipse at 30% 78%, rgba(212,175,55,.04) 0%, transparent 48%),
                #050505;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; opacity: 1;
            transition: opacity 1.35s cubic-bezier(.4, 0, .2, 1);
            pointer-events: auto;
        }
        #loader.fade-out { opacity: 0; pointer-events: none; }

        #ar-container {
            position: fixed; inset: 0; z-index: 0;
            opacity: 0;
            transition: opacity 1.35s cubic-bezier(.4, 0, .2, 1);
        }
        #ar-container.ar-visible { opacity: 1; }

        #particle-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; pointer-events: none;
        }

        .magic-wrap {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center;
            animation: ritualHostIn 2.4s cubic-bezier(.22, 1, .36, 1) forwards;
        }
        @keyframes ritualHostIn {
            from { opacity: 0; filter: blur(6px); transform: scale(.94); }
            to   { opacity: 1; filter: blur(0);   transform: scale(1); }
        }

        .ritual-circle-host {
            position: relative;
            width: min(72vw, 280px);
            height: min(72vw, 280px);
            display: flex; align-items: center; justify-content: center;
        }

        .ritual-svg {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
            animation: ritualSlowSpin 48s linear infinite;
        }
        @keyframes ritualSlowSpin {
            to { transform: rotate(270deg); }
        }

        .ritual-ring-bg {
            fill: none;
            stroke: rgba(212,175,55,.14);
            stroke-width: 1;
        }
        .ritual-ring-glow {
            fill: none;
            stroke: url(#ritualGoldGrad);
            stroke-width: 2.2;
            stroke-linecap: round;
            filter: drop-shadow(0 0 6px rgba(212,175,55,.45));
            stroke-dasharray: 282.74 282.74;
            stroke-dashoffset: 282.74;
            animation: ritualDrawCircle 6.8s cubic-bezier(.42, 0, .2, 1) infinite alternate;
        }
        @keyframes ritualDrawCircle {
            0%   { stroke-dashoffset: 282.74; opacity: .35; }
            100% { stroke-dashoffset: 0;       opacity: 1; }
        }

        .ritual-inner-halo {
            position: absolute;
            width: 58%; height: 58%;
            border-radius: 50%;
            border: 1px solid rgba(212,175,55,.1);
            box-shadow:
                inset 0 0 40px rgba(212,175,55,.06),
                0 0 24px rgba(212,175,55,.08);
            pointer-events: none;
            animation: ritualHalo 5s ease-in-out infinite;
        }
        @keyframes ritualHalo {
            0%, 100% { transform: scale(1);   opacity: .45; }
            50%      { transform: scale(1.04); opacity: .85; }
        }

        .ritual-msg {
            position: relative; z-index: 2;
            max-width: 11.5em;
            margin: 0;
            padding: 0 12px;
            font-family: 'Playfair Display', serif;
            font-size: clamp(.82rem, 2.8vw, 1.05rem);
            font-weight: 500;
            color: #d4af37;
            letter-spacing: .14em;
            line-height: 1.75;
            text-align: center;
            text-shadow: 0 0 20px rgba(212,175,55,.25);
            animation: ritualTextBreath 4.2s ease-in-out infinite;
        }
        @keyframes ritualTextBreath {
            0%, 100% { opacity: .72; }
            50%      { opacity: 1; text-shadow: 0 0 28px rgba(212,175,55,.5); }
        }

        .magic-wrap.ritual-error {
            animation: none;
            opacity: 1;
            filter: none;
            transform: none;
        }
        .ritual-svg--static {
            animation: none !important;
            transform: rotate(-90deg);
        }
        .ritual-inner-halo--static {
            animation: none;
            opacity: .55;
        }

        .loader-msg {
            font-family: 'Playfair Display', serif;
            color: rgba(212,175,55,.82); font-size: clamp(.88rem, 3vw, 1.02rem);
            letter-spacing: .1em; text-align: center;
            padding: 0 28px; line-height: 1.85;
            max-width: 20em;
        }
        .loader-msg small {
            display: block; margin-top: 14px;
            font-size: .62rem; opacity: .48; letter-spacing: .18em; line-height: 1.6;
        }

        /* スキャン枠 */
        #scanning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; pointer-events: none;
            opacity: 1; transition: opacity .5s ease;
        }
        .scan-frame {
            width: 250px; height: 250px;
            border: 2px solid rgba(212,175,55,.5); position: relative;
        }

        /* ② iOS 自動再生トリガー（透明オーバーレイ） */
        #tap-to-play {
            position: fixed; inset: 0; z-index: 20;
            background: transparent; display: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- ローディング画面 -->
    <div id="loader">
        <canvas id="particle-canvas"></canvas>
        <div class="magic-wrap" id="loader-magic-wrap">
            <div class="ritual-circle-host">
                <svg class="ritual-svg" viewBox="0 0 100 100" aria-hidden="true">
                    <defs>
                        <linearGradient id="ritualGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#d4af37" stop-opacity=".95"/>
                            <stop offset="50%" stop-color="#f0e6b4" stop-opacity="1"/>
                            <stop offset="100%" stop-color="#d4af37" stop-opacity=".75"/>
                        </linearGradient>
                    </defs>
                    <circle class="ritual-ring-bg" cx="50" cy="50" r="45"/>
                    <circle class="ritual-ring-glow" cx="50" cy="50" r="45"/>
                </svg>
                <div class="ritual-inner-halo"></div>
                <p class="ritual-msg">芸術に命を吹き込んでいます...</p>
            </div>
        </div>
    </div>

    <!-- スキャンガイド枠 -->
    <div id="scanning-overlay" style="display:none;">
        <div class="scan-frame"></div>
        <p style="color:#d4af37;margin-top:20px;font-size:.85rem;letter-spacing:.1em;">
            絵を枠内に収めてください
        </p>
    </div>

    <!-- iOS 自動再生トリガー（透明・全面タップ） -->
    <div id="tap-to-play"></div>

    <!-- a-scene は JS で構築して appendChild -->
    <div id="ar-container"></div>

    <script>
    (function () {
        var loader  = document.getElementById('loader');
        var arBox   = document.getElementById('ar-container');
        var overlay = document.getElementById('scanning-overlay');
        var tapBtn  = document.getElementById('tap-to-play');
        var orderId = window.__orderId;

        /* ===== パーティクル ===== */
        (function () {
            var cv = document.getElementById('particle-canvas');
            var ctx = cv.getContext('2d');
            var ps = [], W, H;
            function resize() { W = cv.width = cv.offsetWidth; H = cv.height = cv.offsetHeight; }
            resize();
            window.addEventListener('resize', resize);
            function rnd(a, b) { return a + Math.random() * (b - a); }
            for (var i = 0; i < 55; i++) {
                ps.push({ x:rnd(0,1), y:rnd(0,1), sz:rnd(.8,2.2),
                    vx:rnd(-.08,.08), vy:rnd(-.18,-.06),
                    a:rnd(0,1), da:rnd(.004,.012), dir:1 });
            }
            (function draw() {
                ctx.clearRect(0,0,W,H);
                ps.forEach(function(p) {
                    p.x += p.vx/W*60; p.y += p.vy/H*60;
                    if (p.y < -.05) { p.y = 1.05; p.x = rnd(0,1); }
                    if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
                    p.a += p.da * p.dir;
                    if (p.a >= 1) { p.a = 1; p.dir = -1; }
                    if (p.a <= 0) { p.a = 0; p.dir =  1; }
                    ctx.beginPath();
                    ctx.arc(p.x*W, p.y*H, p.sz, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(212,175,55,' + (p.a*.85) + ')';
                    ctx.shadowColor = 'rgba(212,175,55,.6)';
                    ctx.shadowBlur = 6;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            })();
        })();

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function showError(msg, sub) {
            var wrap = document.getElementById('loader-magic-wrap');
            var subHtml = sub ? '<small>' + escapeHtml(sub) + '</small>' : '';
            wrap.classList.add('ritual-error');
            wrap.innerHTML =
                '<div class="ritual-circle-host">' +
                '<svg class="ritual-svg ritual-svg--static" viewBox="0 0 100 100" aria-hidden="true">' +
                '<defs><linearGradient id="ritualGoldGradErr" x1="0%" y1="0%" x2="100%" y2="100%">' +
                '<stop offset="0%" stop-color="#d4af37" stop-opacity=".45"/>' +
                '<stop offset="100%" stop-color="#d4af37" stop-opacity=".92"/></linearGradient></defs>' +
                '<circle class="ritual-ring-bg" cx="50" cy="50" r="45"/>' +
                '<circle fill="none" cx="50" cy="50" r="45" stroke="url(#ritualGoldGradErr)" ' +
                'stroke-width="1.6" stroke-linecap="round" opacity=".72"/></svg>' +
                '<div class="ritual-inner-halo ritual-inner-halo--static"></div>' +
                '<p class="loader-msg">' + escapeHtml(msg) + subHtml + '</p>' +
                '</div>';
        }

        /* ===== ID チェック ===== */
        if (!orderId) {
            showError('オーダーIDを入力してください。',
                      'URL に ?id=オーダーID を付けてアクセスしてください。');
            return;
        }

        var markerSrc = './assets/' + orderId + '/targets.mind';
        var videoBase = './assets/' + orderId + '/' + orderId + '.mp4';
        /* ③ キャッシュ対策: 動画URLにタイムスタンプを付加 */
        var videoSrc  = videoBase + '?v=' + Date.now();

        /* ===== ④ ファイル存在チェック（404 でカメラ不起動） ===== */
        Promise.all([
            fetch(markerSrc, { method: 'HEAD' }),
            fetch(videoBase, { method: 'HEAD' })   // キャッシュバスター不要
        ]).then(function (res) {
            if (!res[0].ok || !res[1].ok) {
                throw new Error('file not found');
            }
            startAR();
        }).catch(function () {
            showError('注文内容を確認中、またはIDが正しくありません。',
                      'ID: ' + orderId);
        });

        /* ===== AR シーン構築 ===== */
        function startAR() {

            /* createElement で属性を全てセットしてから appendChild
               → connectedCallback 発火時点で属性が確定している */

            var videoEl = document.createElement('video');
            videoEl.id  = 'ar-video';
            videoEl.src = videoSrc;
            videoEl.setAttribute('preload', 'auto');
            videoEl.muted = true;
            videoEl.loop  = true;
            videoEl.setAttribute('playsinline', '');
            videoEl.setAttribute('webkit-playsinline', '');
            videoEl.setAttribute('crossorigin', 'anonymous');

            var assetsEl = document.createElement('a-assets');
            assetsEl.appendChild(videoEl);

            var aVideoEl = document.createElement('a-video');
            aVideoEl.setAttribute('src', '#ar-video');
            aVideoEl.setAttribute('width',    '1');
            aVideoEl.setAttribute('height',   '1');
            aVideoEl.setAttribute('position', '0 0 0');
            aVideoEl.setAttribute('rotation', '0 0 0');

            var targetEl = document.createElement('a-entity');
            targetEl.setAttribute('mindar-image-target', 'targetIndex: 0');
            targetEl.appendChild(aVideoEl);

            var cameraEl = document.createElement('a-camera');
            cameraEl.setAttribute('position', '0 0 0');
            cameraEl.setAttribute('look-controls', 'enabled: false');

            var sceneEl = document.createElement('a-scene');
            sceneEl.setAttribute('mindar-image',
                'imageTargetSrc: ' + markerSrc + '; uiLoading: no; uiScanning: no;');
            sceneEl.setAttribute('color-space', 'sRGB');
            sceneEl.setAttribute('renderer', 'colorManagement: true, physicallyCorrectLights');
            sceneEl.setAttribute('vr-mode-ui', 'enabled: false');
            sceneEl.setAttribute('device-orientation-permission-ui', 'enabled: false');
            sceneEl.appendChild(assetsEl);
            sceneEl.appendChild(cameraEl);
            sceneEl.appendChild(targetEl);

            /* DOM 追加 → ここで A-Frame / Mind-AR が初期化 */
            document.getElementById('ar-container').appendChild(sceneEl);

            /* 動画アスペクト比の自動調整 */
            videoEl.addEventListener('loadedmetadata', function () {
                var w = videoEl.videoWidth, h = videoEl.videoHeight;
                if (w && h) {
                    aVideoEl.setAttribute('width',  1);
                    aVideoEl.setAttribute('height', h / w);
                }
            });

            /* 動画ロードエラー */
            videoEl.addEventListener('error', function () {
                showError('動画ファイルを読み込めませんでした。',
                          videoBase);
            });

            /* ⑤ 自動再生保証ロジック（iOS/Android 両対応） */
            var targetVisible = false;
            var playReady     = false;   // ユーザージェスチャーがあったか

            function tryPlay() {
                if (!targetVisible) return;
                videoEl.muted = true;
                videoEl.play().then(function () {
                    tapBtn.style.display = 'none';
                }).catch(function () {
                    /* ジェスチャー待ち: タップ促進オーバーレイを表示 */
                    tapBtn.style.display = 'block';
                });
            }

            /* 透明オーバーレイタップ → 再生トリガー */
            tapBtn.addEventListener('click', function () {
                playReady = true;
                tapBtn.style.display = 'none';
                tryPlay();
            });

            /* document タッチでも同様にトリガー（タップ領域外対策） */
            document.addEventListener('touchstart', function () {
                if (!playReady) { playReady = true; tryPlay(); }
            }, { passive: true });

            sceneEl.addEventListener('arReady', function () {
                arBox.classList.add('ar-visible');
                loader.classList.add('fade-out');
                setTimeout(function () {
                    loader.style.display = 'none';
                    overlay.style.display = 'flex';
                }, 1350);
            });

            sceneEl.addEventListener('targetFound', function () {
                targetVisible = true;
                overlay.style.opacity = '0';
                setTimeout(function () { overlay.style.display = 'none'; }, 500);
                tryPlay();
            });

            sceneEl.addEventListener('targetLost', function () {
                targetVisible = false;
                playReady     = false;
                videoEl.pause();
                overlay.style.display = 'flex';
                setTimeout(function () { overlay.style.opacity = '1'; }, 10);
            });
        }

    })();
    </script>
</body>
</html>
