<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Artkit AR Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

    <!--
        URLパラメータ (?id=xxx) を最初に読み込み、
        A-Frame / Mind-AR のスクリプトより前にパスを確定させる
    -->
    <script>
        (function () {
            var rawId = new URLSearchParams(window.location.search).get('id') || '';
            window.__orderId = rawId.replace(/[^a-zA-Z0-9_-]/g, '');
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; position: fixed;
            background-color: #000;
        }

        a-scene { width: 100vw; height: 100vh; }

        /* ===== ローディング画面 ===== */
        .arjs-loader {
            height: 100%; width: 100%;
            position: fixed; top: 0; left: 0;
            background:
                radial-gradient(ellipse at 50% 42%, rgba(212,175,55,0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 30% 75%, rgba(212,175,55,0.03) 0%, transparent 45%),
                #0a0a0a;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; opacity: 1;
            transition: opacity 1.2s ease;
            pointer-events: auto;
        }
        .arjs-loader.fade-out { opacity: 0; pointer-events: none; }

        #particle-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; pointer-events: none;
        }

        .magic-wrap {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center; gap: 32px;
        }
        .magic-ring-outer {
            position: absolute; width: 200px; height: 200px;
            border-radius: 50%; border: 1px solid rgba(212,175,55,0.12);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            animation: breathe 4s ease-in-out infinite; pointer-events: none;
        }
        .magic-circle {
            position: relative; width: 160px; height: 160px;
            border-radius: 50%; border: 1px solid rgba(212,175,55,0.18);
            display: flex; justify-content: center; align-items: center;
        }
        .magic-circle::before {
            content: ''; position: absolute;
            width: 168px; height: 168px; top: -5px; left: -5px;
            border: 2px solid transparent;
            border-top-color: #d4af37;
            border-right-color: rgba(212,175,55,0.35);
            border-radius: 50%;
            animation: draw-circle 3s linear infinite;
            filter: drop-shadow(0 0 5px rgba(212,175,55,0.7));
        }
        .magic-circle::after {
            content: ''; position: absolute;
            width: 138px; height: 138px; top: 10px; left: 10px;
            border: 1px solid transparent;
            border-bottom-color: rgba(212,175,55,0.45);
            border-left-color: rgba(212,175,55,0.2);
            border-radius: 50%;
            animation: draw-circle-reverse 4.5s linear infinite;
        }
        .magic-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: #d4af37;
            box-shadow: 0 0 8px rgba(212,175,55,0.9), 0 0 20px rgba(212,175,55,0.4);
            animation: dot-glow 2.8s ease-in-out infinite;
        }
        @keyframes draw-circle         { to { transform: rotate(360deg);  } }
        @keyframes draw-circle-reverse { to { transform: rotate(-360deg); } }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%,-50%) scale(1);   opacity: 0.4; }
            50%       { transform: translate(-50%,-50%) scale(1.1); opacity: 0.9; }
        }
        @keyframes dot-glow {
            0%, 100% { box-shadow: 0 0 6px rgba(212,175,55,0.6); }
            50%       { box-shadow: 0 0 14px rgba(212,175,55,1), 0 0 28px rgba(212,175,55,0.4); }
        }
        .magic-text-area {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .magic-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem; font-weight: 400;
            color: #d4af37; letter-spacing: 0.12em; text-align: center;
            animation: gold-pulse 2.8s ease-in-out infinite;
            text-shadow: 0 0 12px rgba(212,175,55,0.35);
        }
        .magic-brand {
            font-family: 'Helvetica Neue', sans-serif;
            font-size: 0.58rem; color: rgba(212,175,55,0.38);
            letter-spacing: 0.45em; text-transform: uppercase;
        }
        @keyframes gold-pulse {
            0%, 100% { opacity: 0.5; text-shadow: 0 0 8px rgba(212,175,55,0.2); }
            50%       { opacity: 1;   text-shadow: 0 0 22px rgba(212,175,55,0.65), 0 0 44px rgba(212,175,55,0.2); }
        }
        .loader-error {
            font-family: 'Playfair Display', serif;
            color: rgba(212,175,55,0.7); font-size: 1.0rem;
            letter-spacing: 0.12em; text-align: center;
            padding: 0 40px; line-height: 1.8;
        }

        #scanning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; pointer-events: none;
            opacity: 1; transition: opacity 0.5s ease;
        }
        .scan-frame {
            width: 250px; height: 250px;
            border: 2px solid rgba(212,175,55,0.5); position: relative;
        }
    </style>
</head>

<body>
    <div id="loader" class="arjs-loader">
        <canvas id="particle-canvas"></canvas>
        <div class="magic-wrap">
            <div style="position: relative; width: 160px; height: 160px;">
                <div class="magic-ring-outer"></div>
                <div class="magic-circle"><div class="magic-dot"></div></div>
            </div>
            <div class="magic-text-area">
                <div class="magic-text">芸術に命を吹き込んでいます...</div>
                <div class="magic-brand">My Artkit Premium</div>
            </div>
        </div>
    </div>

    <div id="scanning-overlay" style="display: none;">
        <div class="scan-frame"></div>
        <p style="color: #d4af37; margin-top: 20px;">絵を枠内に収めてください</p>
    </div>

    <!-- a-scene は JS で createElement してから appendChild する（属性確定後に DOM 追加） -->
    <div id="ar-container"></div>

    <script>
        var loader  = document.getElementById('loader');
        var overlay = document.getElementById('scanning-overlay');
        var orderId = window.__orderId;

        // ===== パーティクル =====
        (function () {
            var canvas = document.getElementById('particle-canvas');
            var ctx = canvas.getContext('2d');
            var particles = [], W, H;
            function resize() { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; }
            resize();
            window.addEventListener('resize', resize);
            function rand(a, b) { return a + Math.random() * (b - a); }
            for (var i = 0; i < 55; i++) {
                particles.push({ x: rand(0,1), y: rand(0,1), size: rand(0.8,2.2),
                    speedX: rand(-0.08,0.08), speedY: rand(-0.18,-0.06),
                    alpha: rand(0,1), alphaSpeed: rand(0.004,0.012), alphaDir: 1 });
            }
            (function draw() {
                ctx.clearRect(0, 0, W, H);
                particles.forEach(function (p) {
                    p.x += p.speedX / W * 60; p.y += p.speedY / H * 60;
                    if (p.y < -0.05) { p.y = 1.05; p.x = rand(0,1); }
                    if (p.x < 0) p.x = 1; if (p.x > 1) p.x = 0;
                    p.alpha += p.alphaSpeed * p.alphaDir;
                    if (p.alpha >= 1) { p.alpha = 1; p.alphaDir = -1; }
                    if (p.alpha <= 0) { p.alpha = 0; p.alphaDir =  1; }
                    ctx.beginPath();
                    ctx.arc(p.x * W, p.y * H, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(212,175,55,' + (p.alpha * 0.85) + ')';
                    ctx.shadowColor = 'rgba(212,175,55,0.6)';
                    ctx.shadowBlur = 6;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            })();
        })();

        // ===== ID チェック =====
        if (!orderId) {
            loader.querySelector('.magic-wrap').innerHTML =
                '<p class="loader-error">オーダーIDを入力してください。<br>URLに ?id=オーダーID を付けてアクセスしてください。</p>';
        } else {
            var markerSrc = './assets/' + orderId + '/targets.mind';
            var videoSrc  = './assets/' + orderId + '/' + orderId + '.mp4';

            // ===== createElement で属性を確定してから DOM に追加 =====
            // → connectedCallback が発火する時点で全属性がセット済み

            // <video>
            var videoEl = document.createElement('video');
            videoEl.id = 'dog-video';
            videoEl.src = videoSrc;
            videoEl.setAttribute('preload', 'auto');
            videoEl.muted = true;
            videoEl.loop  = true;
            videoEl.setAttribute('playsinline', '');
            videoEl.setAttribute('webkit-playsinline', '');
            videoEl.setAttribute('crossorigin', 'anonymous');

            // <a-assets>
            var assetsEl = document.createElement('a-assets');
            assetsEl.appendChild(videoEl);

            // <a-video>
            var aVideoEl = document.createElement('a-video');
            aVideoEl.id = 'dog-video-plane';
            aVideoEl.setAttribute('src', '#dog-video');
            aVideoEl.setAttribute('width', '1');
            aVideoEl.setAttribute('height', '1');
            aVideoEl.setAttribute('position', '0 0 0');
            aVideoEl.setAttribute('rotation', '0 0 0');

            // <a-entity mindar-image-target>
            var targetEl = document.createElement('a-entity');
            targetEl.setAttribute('mindar-image-target', 'targetIndex: 0');
            targetEl.appendChild(aVideoEl);

            // <a-camera>
            var cameraEl = document.createElement('a-camera');
            cameraEl.setAttribute('position', '0 0 0');
            cameraEl.setAttribute('look-controls', 'enabled: false');

            // <a-scene> — 全属性をセットしてから最後に appendChild
            var sceneEl = document.createElement('a-scene');
            sceneEl.setAttribute('mindar-image',
                'imageTargetSrc: ' + markerSrc + '; uiLoading: no; uiScanning: no;');
            sceneEl.setAttribute('color-space', 'sRGB');
            sceneEl.setAttribute('renderer', 'colorManagement: true, physicallyCorrectLights');
            sceneEl.setAttribute('vr-mode-ui', 'enabled: false');
            sceneEl.setAttribute('device-orientation-permission-ui', 'enabled: false');
            sceneEl.appendChild(assetsEl);
            sceneEl.appendChild(cameraEl);
            sceneEl.appendChild(targetEl);

            // DOM に追加 → ここで connectedCallback が発火し A-Frame が正しく初期化
            document.getElementById('ar-container').appendChild(sceneEl);

            // 動画アスペクト比の自動調整
            videoEl.addEventListener('loadedmetadata', function () {
                var w = videoEl.videoWidth, h = videoEl.videoHeight;
                if (w && h) {
                    aVideoEl.setAttribute('width', 1);
                    aVideoEl.setAttribute('height', h / w);
                }
            });

            videoEl.addEventListener('error', function () {
                loader.querySelector('.magic-wrap').innerHTML =
                    '<p class="loader-error">動画ファイルが見つかりません。<br>' +
                    '<span style="font-size:0.75rem;opacity:0.6;">' + videoSrc + '</span></p>';
            });

            function playVideo()  { videoEl.muted = true; videoEl.play().catch(function(){}); }
            function pauseVideo() { videoEl.pause(); }

            sceneEl.addEventListener('arReady', function () {
                loader.classList.add('fade-out');
                setTimeout(function () {
                    loader.style.display = 'none';
                    overlay.style.display = 'flex';
                }, 1200);
            });

            sceneEl.addEventListener('targetFound', function () {
                overlay.style.opacity = '0';
                setTimeout(function () { overlay.style.display = 'none'; }, 500);
                playVideo();
            });

            sceneEl.addEventListener('targetLost', function () {
                overlay.style.display = 'flex';
                setTimeout(function () { overlay.style.opacity = '1'; }, 10);
                pauseVideo();
            });
        }
    </script>
</body>
</html>
