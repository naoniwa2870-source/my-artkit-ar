<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Artkit AR Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background-color: #000;
        }

        a-scene {
            width: 100vw;
            height: 100vh;
        }

        .arjs-loader {
            height: 100%; width: 100%; position: absolute; top: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.9); display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: #fff;
        }

        #scanning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; pointer-events: none;
        }
        .scan-frame {
            width: 250px; height: 250px;
            border: 2px solid rgba(212, 175, 55, 0.5);
            position: relative;
        }
    </style>
</head>

<body>
    <div id="loader" class="arjs-loader">
        <div style="font-size: 1.2rem; color: #d4af37;">芸術に命を吹き込んでいます...</div>
    </div>

    <div id="scanning-overlay" style="display: none;">
        <div class="scan-frame"></div>
        <p style="color: #d4af37; margin-top: 20px;">絵を枠内に収めてください</p>
    </div>

    <a-scene
        mindar-image="imageTargetSrc: ./assets/targets.mind; uiLoading: no; uiScanning: no;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <video
                id="dog-video"
                src="./assets/dog-run.mp4"
                preload="auto"
                muted
                loop
                playsinline
                webkit-playsinline
                crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video
                id="dog-video-plane"
                src="#dog-video"
                width="1"
                height="1"
                position="0 0 0"
                rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const loader = document.querySelector('#loader');
        const overlay = document.querySelector('#scanning-overlay');
        const dogVideo = document.querySelector('#dog-video');
        const dogVideoPlane = document.querySelector('#dog-video-plane');

        // 動画のアスペクト比に合わせてa-videoのサイズを自動調整
        if (dogVideo && dogVideoPlane) {
            dogVideo.addEventListener('loadedmetadata', function () {
                var w = dogVideo.videoWidth;
                var h = dogVideo.videoHeight;
                if (!w || !h) return;
                var baseW = 1;
                dogVideoPlane.setAttribute('width', baseW);
                dogVideoPlane.setAttribute('height', baseW * (h / w));
            });
        }

        function playDogVideo() {
            if (!dogVideo) return;
            dogVideo.muted = true;
            dogVideo.play().catch(function () {});
        }

        function pauseDogVideo() {
            if (!dogVideo) return;
            dogVideo.pause();
        }

        sceneEl.addEventListener('arReady', function () {
            loader.style.display = 'none';
            overlay.style.display = 'flex';
        });

        sceneEl.addEventListener('targetFound', function () {
            overlay.style.display = 'none';
            playDogVideo();
        });

        sceneEl.addEventListener('targetLost', function () {
            overlay.style.display = 'flex';
            pauseDogVideo();
        });
    </script>
</body>
</html>
