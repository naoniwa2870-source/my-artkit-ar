<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Artkit AR Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background-color: #000;
        }

        a-scene {
            width: 100vw;
            height: 100vh;
        }

        /* ===== ローディング画面 ===== */
        .arjs-loader {
            height: 100%; width: 100%;
            position: fixed; top: 0; left: 0;
            /* 漆黒 + 微細なノイズテクスチャ感をグラデーションで表現 */
            background:
                radial-gradient(ellipse at 50% 40%, rgba(212,175,55,0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 30% 70%, rgba(212,175,55,0.03) 0%, transparent 50%),
                #0a0a0a;
            display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
            /* フェードアウト用トランジション */
            opacity: 1;
            transition: opacity 1.2s ease;
            pointer-events: auto;
        }

        .arjs-loader.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* パーティクルキャンバス */
        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* ローディングコンテンツ */
        .loader-content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            z-index: 1;
        }

        /* 装飾ライン */
        .loader-line {
            width: 48px; height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }

        /* ゴールドのメインテキスト（パルスアニメーション） */
        .loader-text {
            font-size: 1.15rem;
            color: #d4af37;
            letter-spacing: 0.18em;
            font-weight: 300;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            animation: gold-pulse 2.8s ease-in-out infinite;
            text-shadow: 0 0 12px rgba(212,175,55,0.4);
        }

        /* ブランド名 */
        .loader-brand {
            font-size: 0.6rem;
            color: rgba(212,175,55,0.4);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        @keyframes gold-pulse {
            0%, 100% { opacity: 0.45; text-shadow: 0 0 8px rgba(212,175,55,0.2); }
            50%       { opacity: 1;    text-shadow: 0 0 20px rgba(212,175,55,0.6), 0 0 40px rgba(212,175,55,0.2); }
        }

        #scanning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; pointer-events: none;
        }
        .scan-frame {
            width: 250px; height: 250px;
            border: 2px solid rgba(212, 175, 55, 0.5);
            position: relative;
        }
    </style>
</head>

<body>
    <div id="loader" class="arjs-loader">
        <!-- パーティクル描画キャンバス -->
        <canvas id="particle-canvas"></canvas>

        <div class="loader-content">
            <div class="loader-line"></div>
            <div class="loader-text">芸術に命を吹き込んでいます...</div>
            <div class="loader-line"></div>
            <div class="loader-brand">My Artkit Premium</div>
        </div>
    </div>

    <div id="scanning-overlay" style="display: none;">
        <div class="scan-frame"></div>
        <p style="color: #d4af37; margin-top: 20px;">絵を枠内に収めてください</p>
    </div>

    <a-scene
        mindar-image="imageTargetSrc: ./assets/targets.mind; uiLoading: no; uiScanning: no;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <video
                id="dog-video"
                src="./assets/dog-run.mp4"
                preload="auto"
                muted
                loop
                playsinline
                webkit-playsinline
                crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video
                id="dog-video-plane"
                src="#dog-video"
                width="1"
                height="1"
                position="0 0 0"
                rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const loader = document.querySelector('#loader');
        const overlay = document.querySelector('#scanning-overlay');
        const dogVideo = document.querySelector('#dog-video');
        const dogVideoPlane = document.querySelector('#dog-video-plane');

        // 動画のアスペクト比に合わせてa-videoのサイズを自動調整
        if (dogVideo && dogVideoPlane) {
            dogVideo.addEventListener('loadedmetadata', function () {
                var w = dogVideo.videoWidth;
                var h = dogVideo.videoHeight;
                if (!w || !h) return;
                var baseW = 1;
                dogVideoPlane.setAttribute('width', baseW);
                dogVideoPlane.setAttribute('height', baseW * (h / w));
            });
        }

        function playDogVideo() {
            if (!dogVideo) return;
            dogVideo.muted = true;
            dogVideo.play().catch(function () {});
        }

        function pauseDogVideo() {
            if (!dogVideo) return;
            dogVideo.pause();
        }

        // ===== パーティクル =====
        (function () {
            var canvas = document.getElementById('particle-canvas');
            var ctx = canvas.getContext('2d');
            var particles = [];
            var W, H;

            function resize() {
                W = canvas.width  = canvas.offsetWidth;
                H = canvas.height = canvas.offsetHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            function rand(min, max) { return min + Math.random() * (max - min); }

            // 粒子を生成
            for (var i = 0; i < 55; i++) {
                particles.push({
                    x:     rand(0, 1),   // 0〜1 の相対座標
                    y:     rand(0, 1),
                    size:  rand(0.8, 2.2),
                    speedX: rand(-0.08, 0.08),
                    speedY: rand(-0.18, -0.06),  // ふんわり上昇
                    alpha:  rand(0, 1),
                    alphaSpeed: rand(0.004, 0.012),
                    alphaDir: 1
                });
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                particles.forEach(function (p) {
                    // 位置を更新
                    p.x += p.speedX / W * 60;
                    p.y += p.speedY / H * 60;
                    if (p.y < -0.05) { p.y = 1.05; p.x = rand(0, 1); }
                    if (p.x < 0) p.x = 1;
                    if (p.x > 1) p.x = 0;

                    // アルファを往復
                    p.alpha += p.alphaSpeed * p.alphaDir;
                    if (p.alpha >= 1) { p.alpha = 1; p.alphaDir = -1; }
                    if (p.alpha <= 0) { p.alpha = 0; p.alphaDir =  1; }

                    // 描画（ゴールドのキラキラ）
                    ctx.beginPath();
                    ctx.arc(p.x * W, p.y * H, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(212,175,55,' + (p.alpha * 0.85) + ')';
                    ctx.shadowColor = 'rgba(212,175,55,0.6)';
                    ctx.shadowBlur  = 6;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ===== arReady: フェードアウトでARへ遷移 =====
        sceneEl.addEventListener('arReady', function () {
            loader.classList.add('fade-out');
            setTimeout(function () {
                loader.style.display = 'none';
                overlay.style.display = 'flex';
            }, 1200);
        });

        sceneEl.addEventListener('targetFound', function () {
            overlay.style.display = 'none';
            playDogVideo();
        });

        sceneEl.addEventListener('targetLost', function () {
            overlay.style.display = 'flex';
            pauseDogVideo();
        });
    </script>
</body>
</html>
