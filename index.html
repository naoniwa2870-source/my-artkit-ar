<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Artkit AR Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* 1. 画面の余白を完全にゼロにする */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed; /* iPhoneのスクロール防止 */
            background-color: #000;
        }

        /* 2. ARシーンを全画面に強制 */
        a-scene {
            width: 100vw;
            height: 100vh;
        }

        /* 3. ローディング画面 */
        .arjs-loader {
            height: 100%; width: 100%; position: absolute; top: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.9); display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: #fff;
        }

        /* 4. スキャン枠（高級感を出すため） */
        #scanning-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; pointer-events: none;
        }
        .scan-frame {
            width: 250px; height: 250px;
            border: 2px solid rgba(212, 175, 55, 0.5);
            position: relative;
        }
    </style>
</head>

<body>
    <div id="loader" class="arjs-loader">
        <div style="font-size: 1.2rem; color: #d4af37;">芸術に命を吹き込んでいます...</div>
    </div>

    <div id="scanning-overlay" style="display: none;">
        <div class="scan-frame"></div>
        <p style="color: #d4af37; margin-top: 20px;">絵を枠内に収めてください</p>
    </div>

    <a-scene
        mindar-image="imageTargetSrc: ./assets/targets.mind; uiLoading: no; uiScanning: no;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-sphere
                position="0 0 0"
                radius="0.5"
                material="color: #d4af37; metalness: 0.8; roughness: 0.2; opacity: 0.9"
                animation="property: position; to: 0 0.2 0.1; dir: alternate; dur: 2000; loop: true">
            </a-sphere>
            <a-text value="Memory is Alive" color="#d4af37" align="center" width="3" position="0 -0.8 0"></a-text>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const loader = document.querySelector('#loader');
        const overlay = document.querySelector('#scanning-overlay');

        // ARの準備ができたら
        sceneEl.addEventListener("arReady", (event) => {
            loader.style.display = 'none';
            overlay.style.display = 'flex';
        });

        // ターゲットを認識したら枠を消す
        sceneEl.addEventListener("targetFound", event => {
            overlay.style.display = 'none';
        });

        // ターゲットを見失ったら枠を出す
        sceneEl.addEventListener("targetLost", event => {
            overlay.style.display = 'flex';
        });
    </script>
</body>
</html>
