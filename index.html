<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Artkit AR</title>

    <!-- Mind-AR + A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000;
        }

        /* Mind-AR 標準UIを非表示（独自ローディング画面を使うため） */
        .mindar-ui-overlay {
            display: none !important;
        }

        /* ===== ローディング画面 ===== */
        .arjs-loader {
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            gap: 32px;
        }

        .arjs-loader::before {
            content: '';
            position: absolute;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(224, 205, 169, 0.07) 0%, transparent 70%);
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { transform: scale(0.9); opacity: 0.6; }
            50%       { transform: scale(1.2); opacity: 1; }
        }

        .spinner-wrap {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .ring-static {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(224, 205, 169, 0.18);
        }

        .ring-mid {
            position: absolute;
            inset: 14px;
            border-radius: 50%;
            border: 1px solid rgba(224, 205, 169, 0.09);
        }

        .spinner {
            width: 120px;
            height: 120px;
            animation: rotate 2s linear infinite;
        }

        .spinner-track {
            stroke: rgba(224, 205, 169, 0.13);
            stroke-width: 2;
            fill: none;
        }

        .spinner-path {
            stroke: url(#goldGradient);
            stroke-width: 2.5;
            stroke-linecap: round;
            fill: none;
            animation: dash 2s ease-in-out infinite;
            filter: drop-shadow(0 0 4px rgba(224, 205, 169, 0.75));
        }

        .spinner-inner {
            position: absolute;
            inset: 28px;
            width: 64px;
            height: 64px;
            animation: rotate-reverse 3s linear infinite;
        }

        .spinner-inner-path {
            stroke: rgba(224, 205, 169, 0.38);
            stroke-width: 1;
            stroke-linecap: round;
            fill: none;
            stroke-dasharray: 20, 80;
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #e0cda9;
            box-shadow: 0 0 8px rgba(224, 205, 169, 0.9), 0 0 16px rgba(224, 205, 169, 0.4);
        }

        @keyframes rotate         { 100% { transform: rotate(360deg); } }
        @keyframes rotate-reverse { 100% { transform: rotate(-360deg); } }

        @keyframes dash {
            0%   { stroke-dasharray: 1, 250;   stroke-dashoffset: 0; }
            50%  { stroke-dasharray: 160, 250; stroke-dashoffset: -55; }
            100% { stroke-dasharray: 160, 250; stroke-dashoffset: -210; }
        }

        .text-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .loading-text {
            font-size: 1.05rem;
            letter-spacing: 0.15em;
            font-weight: 300;
            color: #e8e8e8;
            animation: text-fade 2.4s ease-in-out infinite;
        }

        .dots span {
            animation: dot-blink 1.4s ease-in-out infinite;
            opacity: 0;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-blink {
            0%, 80%, 100% { opacity: 0; }
            40%            { opacity: 1; }
        }

        .divider {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e0cda9, transparent);
            animation: divider-expand 2.4s ease-in-out infinite;
        }

        @keyframes divider-expand {
            0%, 100% { width: 30px; opacity: 0.4; }
            50%       { width: 60px; opacity: 1; }
        }

        .brand-name {
            font-size: 0.65rem;
            color: rgba(224, 205, 169, 0.5);
            letter-spacing: 0.35em;
            text-transform: uppercase;
        }

        @keyframes text-fade {
            0%, 100% { opacity: 0.55; }
            50%       { opacity: 1; }
        }

        .arjs-loader.fade-out {
            transition: opacity 1s ease;
            opacity: 0;
            pointer-events: none;
        }

        a-scene {
            display: none;
            width: 100vw !important;
            height: 100vh !important;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Mind-AR が生成するカメラ映像コンテナを全画面に */
        a-scene canvas,
        .a-canvas {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover;
        }

        /* ===== スキャンガイド枠 ===== */
        #scanning-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            opacity: 0;            /* arReady まで非表示 */
            transition: opacity 0.6s ease;
        }

        #scanning-overlay.visible {
            opacity: 1;
        }

        #scanning-overlay.hide {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .scan-frame {
            position: relative;
            width: min(70vw, 70vh);
            height: min(70vw, 70vh);
            border: 1px solid rgba(212, 175, 55, 0.25);
        }

        /* 4隅のブラケット（各コーナーを独立した要素で作る） */
        .corner {
            position: absolute;
            width: 22px;
            height: 22px;
            border-color: #d4af37;
            border-style: solid;
        }
        .corner-tl { top: -1px;    left: -1px;    border-width: 2px 0 0 2px; }
        .corner-tr { top: -1px;    right: -1px;   border-width: 2px 2px 0 0; }
        .corner-bl { bottom: -1px; left: -1px;    border-width: 0 0 2px 2px; }
        .corner-br { bottom: -1px; right: -1px;   border-width: 0 2px 2px 0; }

        /* スキャンライン（横に流れる） */
        .scan-line {
            position: absolute;
            left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.7), transparent);
            animation: scan-move 2.4s ease-in-out infinite;
            box-shadow: 0 0 6px rgba(212, 175, 55, 0.4);
        }

        @keyframes scan-move {
            0%   { top: 0%;   opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .scan-label {
            margin-top: 20px;
            color: #d4af37;
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            opacity: 0.8;
            animation: text-fade 2.4s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <!-- ===== ローディング画面 ===== -->
    <div class="arjs-loader">

        <div class="spinner-wrap">
            <div class="ring-static"></div>
            <div class="ring-mid"></div>

            <svg class="spinner" viewBox="0 0 120 120">
                <defs>
                    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%"   stop-color="#f5edd8"/>
                        <stop offset="50%"  stop-color="#e0cda9"/>
                        <stop offset="100%" stop-color="#b89d78"/>
                    </linearGradient>
                </defs>
                <circle class="spinner-track" cx="60" cy="60" r="50"/>
                <circle class="spinner-path"  cx="60" cy="60" r="50"
                        stroke-dasharray="1, 314" stroke-dashoffset="0"/>
            </svg>

            <svg class="spinner-inner" viewBox="0 0 64 64">
                <circle class="spinner-inner-path" cx="32" cy="32" r="28"/>
            </svg>

            <div class="center-dot"></div>
        </div>

        <div class="text-area">
            <div class="loading-text">
                芸術に命を吹き込んでいます<span class="dots"><span>.</span><span>.</span><span>.</span></span>
            </div>
            <div class="divider"></div>
            <div class="brand-name">My Artkit Premium</div>
        </div>

    </div>

    <!-- ===== スキャンガイド枠（arReady 後に表示、targetFound で消える） ===== -->
    <div id="scanning-overlay">
        <div class="scan-frame">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="scan-line"></div>
        </div>
        <p class="scan-label">絵を枠内に収めてください</p>
    </div>

    <!-- ===== Mind-AR シーン ===== -->
    <a-scene
        mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets></a-assets>

        <!-- ライティング -->
        <a-light type="directional" intensity="1.0" color="#fff8f0" position="1 3 2"></a-light>
        <a-light type="ambient"     intensity="0.5" color="#ede0cc"></a-light>

        <!-- Mind-AR カメラ -->
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- マーカー (targets.mind の 0番目のターゲット) -->
        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">

            <!-- AR コンテンツ（検出前は非表示） -->
            <a-entity id="ar-object" visible="false">

                <!-- ゴールドの箱: 常時回転 + 上下浮遊 -->
                <a-box
                    id="gold-box"
                    position="0 0.1 0"
                    width="0.15" height="0.15" depth="0.15"
                    material="color: #e0cda9; metalness: 0.9; roughness: 0.08; emissive: #c8a870; emissiveIntensity: 0.25"
                    animation__spin="property: rotation; from: 0 0 0; to: 0 360 0; dur: 2800; loop: true; easing: linear"
                    animation__float="property: position; from: 0 0.08 0; to: 0 0.16 0; dur: 1800; dir: alternate; loop: true; easing: easeInOutSine">
                </a-box>

            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        const scene    = document.querySelector('a-scene');
        const loader   = document.querySelector('.arjs-loader');
        const arTarget = document.querySelector('#ar-target');
        const arObject = document.querySelector('#ar-object');
        const scanOverlay = document.querySelector('#scanning-overlay');

        // Mind-AR の準備完了 → ローディング画面をフェードアウト → スキャン枠を表示
        scene.addEventListener('arReady', () => {
            loader.classList.add('fade-out');
            setTimeout(() => {
                loader.style.display = 'none';
                scene.style.display = 'block';
                scanOverlay.classList.add('visible');
            }, 1000);
        });

        // お祝いSE: ペンタトニック上昇チャイム
        function playCelebrationSound() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtx) return;
            const ctx = new AudioCtx();
            const freqs = [523.25, 659.25, 783.99, 880.00, 1046.50]; // C5 E5 G5 A5 C6
            freqs.forEach((freq, i) => {
                const osc  = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                const t = ctx.currentTime + i * 0.13;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.22, t + 0.04);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
                osc.start(t);
                osc.stop(t + 1.0);
            });
        }

        // マーカー検出 → ポップイン + SE
        let soundCooldown = false;

        arTarget.addEventListener('targetFound', () => {
            // スキャン枠をフェードアウトして非表示
            scanOverlay.classList.add('hide');
            setTimeout(() => { scanOverlay.style.display = 'none'; }, 500);

            arObject.setAttribute('visible', true);
            // ゼロスケールから等倍へ弾むように拡大
            arObject.setAttribute('scale', '0 0 0');
            arObject.setAttribute('animation__popin',
                'property: scale; from: 0 0 0; to: 1 1 1; dur: 500; easing: easeOutBack; loop: false;'
            );
            if (!soundCooldown) {
                playCelebrationSound();
                soundCooldown = true;
                setTimeout(() => { soundCooldown = false; }, 3000);
            }
        });

        // マーカー消失 → AR非表示 + スキャン枠を再表示
        arTarget.addEventListener('targetLost', () => {
            arObject.setAttribute('visible', false);
            scanOverlay.style.display = 'flex';
            scanOverlay.classList.remove('hide');
            scanOverlay.classList.add('visible');
        });
    </script>

</body>
</html>
